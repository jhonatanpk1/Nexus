<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}"></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
    <div th:insert="~{layout/header :: header}"></div>

    <main>
        <h2 th:text="${titulo}"></h2>

        <form th:action="@{/piloto/guardar}" th:object="${piloto}" method="post" class="nexus-form">
            <input type="hidden" th:field="*{idPiloto}" th:if="${piloto.idPiloto != null}" />

            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" th:field="*{nombre}" required class="form-control">
            </div>
            <div class="form-group">
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" th:field="*{apellido}" required class="form-control">
            </div>
            
            <div class="form-group">
                <label for="vuelo">Vuelo Asignado:</label>
                <select id="vuelo" th:field="*{vuelo}" class="form-control">
                    <option value="">-- Seleccione un Vuelo (Opcional) --</option>
                    <option th:each="vuelo : ${vuelosDisponibles}" 
                            th:value="${vuelo.idVuelo}" 
                            th:text="${vuelo.numeroVuelo + ' (' + vuelo.origen + ' - ' + vuelo.destino + ')'}"
                            th:selected="${piloto.vuelo != null and piloto.vuelo.idVuelo == vuelo.idVuelo}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="viaje">Viaje Asignado:</label>
                <select id="viaje" th:field="*{viaje}" class="form-control">
                    <option value="">-- Seleccione un Viaje (Opcional) --</option>
                    <option th:each="viaje : ${viajesDisponibles}" 
                            th:value="${viaje.idViaje}" 
                            th:text="${'Viaje ID: ' + viaje.idViaje + ' - Fecha: ' + viaje.fechaInicio}"
                            th:selected="${piloto.viaje != null and piloto.viaje.idViaje == viaje.idViaje}">
                    </option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-button"><i class="fas fa-save"></i> Guardar Piloto</button>
                <a th:href="@{/piloto/listar}" class="cancel-button"><i class="fas fa-times-circle"></i> Cancelar</a>
            </div>
        </form>

        <div class="back-link">
            <a th:href="@{/piloto/listar}" style="text-decoration: none;"><i class="fas fa-arrow-left"></i> Volver a la lista de pilotos</a>
        </div>
    </main>

    <div th:insert="~{layout/footer :: footer}"></div>
</body>
</html>
