<!DOCTYPE html> 
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Nexus - Crear/Editar Usuario</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
    <main class="form-container">
        <h2 th:text="${titulo}">Crear/Editar Usuario</h2>
        <form th:action="@{/usuario/save}" method="post" th:object="${usuario}">
            <input type="hidden" th:field="*{idUsuario}" th:if="${usuario.idUsuario != null}">

            <div class="form-group">
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" th:field="*{usuario}" required>
            </div>
            <div class="form-group">
                <label for="contrasena">Contraseña:</label>
                <input type="password" id="contrasena" th:field="*{contrasena}" required>
            </div>
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" th:field="*{nombre}">
            </div>
            <div class="form-group">
                <label for="rol">Rol:</label>
                <select id="rol" th:field="*{rol}">
                    <option th:each="rol : ${roles}" th:value="${rol}" th:text="${rol}"></option>
                </select>
            </div>
            <div class="button-container">
                <button type="submit" class="form-button save-button">Guardar Usuario</button>
                <a th:href="@{/usuario/listar}" class="form-button cancel-button">Cancelar</a>
            </div>
        </form>
    </main>
</body>
</html>
