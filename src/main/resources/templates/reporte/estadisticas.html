<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas de la Aerolínea | Nexus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
    <div class="container">
        <h1>Estadísticas de la Aerolínea</h1>

        <div>
            <h2>Total de Reservas</h2>
            <p class="lead" id="totalReservasTexto">Cargando...</p>
        </div>

        <div class="chart-container">
            <h2>Reservas por Estado</h2>
            <canvas id="reservasPorEstadoChart" width="400" height="200"></canvas>
            <table id="reservasPorEstadoTable">
                <thead>
                    <tr>
                        <th>Estado de Reserva</th>
                        <th>Número de Reservas</th>
                    </tr>
                </thead>
                <tbody id="reservasPorEstadoTablaBody">
                    <tr><td colspan="2">No hay datos disponibles.</td></tr>
                </tbody>
            </table>
        </div>

        <div class="chart-container">
            <h2>Destinos Más Populares</h2>
            <canvas id="destinosPopularesChart" width="400" height="200"></canvas>
            <table id="destinosPopularesTable">
                <thead>
                    <tr>
                        <th>Destino</th>
                        <th>Número de Reservas</th>
                    </tr>
                </thead>
                <tbody id="destinosPopularesTablaBody">
                    <tr><td colspan="2">No hay datos disponibles.</td></tr>
                </tbody>
            </table>
        </div>

        <div>
            <h2>Total de Clientes</h2>
            <p class="lead" id="totalClientesTexto">Cargando...</p>
        </div>

        <button class="btn btn-primary" onclick="window.location.href='/reporte/generar-pdf/estadisticas'">Descargar PDF</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const totalReservasTexto = document.getElementById('totalReservasTexto');
            const reservasPorEstadoCanvas = document.getElementById('reservasPorEstadoChart');
            const reservasPorEstadoTablaBody = document.getElementById('reservasPorEstadoTablaBody');
            const destinosPopularesCanvas = document.getElementById('destinosPopularesChart');
            const destinosPopularesTablaBody = document.getElementById('destinosPopularesTablaBody');
            const totalClientesTexto = document.getElementById('totalClientesTexto');

            const reservasPorEstadoChart = new Chart(reservasPorEstadoCanvas, {
                type: 'pie',
                data: {
                    labels: ['Pendiente', 'Confirmada', 'Cancelada', 'Finalizada'], // Etiquetas fijas
                    datasets: [{
                        data: [0, 0, 0, 0], // Datos iniciales en cero
                        backgroundColor: [
                            'rgba(255, 193, 7, 0.7)',   // Pendiente (amarillo)
                            'rgba(40, 167, 69, 0.7)',   // Confirmada (verde)
                            'rgba(220, 53, 69, 0.7)',   // Cancelada (rojo)
                            'rgba(0, 123, 255, 0.7)'    // Finalizada (azul)
                        ],
                        hoverOffset: 4
                    }]
                }
            });

            const destinosPopularesChart = new Chart(destinosPopularesCanvas, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Número de Reservas',
                        data: [],
                        backgroundColor: 'rgba(0, 123, 255, 0.7)'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    scales: {
                        x: {
                            beginAtZero: true
                        }
                    }
                }
            });

            function cargarEstadisticas() {
                fetch('/api/reportes/estadisticas-data')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        return response.json();
                    })
                    .then(data => {
                        totalReservasTexto.textContent = `Total de Reservas: ${data.totalReservas}`;
                        totalClientesTexto.textContent = `Total de Clientes: ${data.totalClientes}`;

                        // Actualizar gráfico y tabla de reservas por estado
                        const reservasPorEstadoData = data.reservasPorEstado || {};
                        reservasPorEstadoTablaBody.innerHTML = '';
                        reservasPorEstadoChart.data.datasets[0].data = [
                            reservasPorEstadoData['PENDIENTE'] || 0,
                            reservasPorEstadoData['CONFIRMADA'] || 0,
                            reservasPorEstadoData['CANCELADA'] || 0,
                            reservasPorEstadoData['FINALIZADA'] || 0
                        ];
                        ['PENDIENTE', 'CONFIRMADA', 'CANCELADA', 'FINALIZADA'].forEach(estado => {
                            const row = reservasPorEstadoTablaBody.insertRow();
                            const estadoCell = row.insertCell();
                            const cantidadCell = row.insertCell();
                            estadoCell.textContent = estado;
                            cantidadCell.textContent = reservasPorEstadoData[estado] || 0;
                        });
                        reservasPorEstadoChart.update();

                        // Actualizar tabla y gráfico de destinos populares
                        if (data.destinosPopulares && data.destinosPopulares.length > 0) {
                            destinosPopularesTablaBody.innerHTML = '';
                            destinosPopularesChart.data.labels = data.destinosPopulares.map(item => item.destino);
                            destinosPopularesChart.data.datasets[0].data = data.destinosPopulares.map(item => item.cantidad);
                            data.destinosPopulares.forEach(item => {
                                const row = destinosPopularesTablaBody.insertRow();
                                const destinoCell = row.insertCell();
                                const cantidadCell = row.insertCell();
                                destinoCell.textContent = item.destino;
                                cantidadCell.textContent = item.cantidad;
                            });
                            destinosPopularesChart.update();
                        } else {
                            destinosPopularesTablaBody.innerHTML = '<tr><td colspan="2">No hay datos disponibles.</td></tr>';
                            destinosPopularesChart.data.labels = [];
                            destinosPopularesChart.data.datasets[0].data = [];
                            destinosPopularesChart.update();
                        }
                    })
                    .catch(error => {
                        console.error('Error al cargar las estadísticas:', error);
                        totalReservasTexto.textContent = 'Error al cargar datos.';
                        totalClientesTexto.textContent = 'Error al cargar datos.';
                        reservasPorEstadoTablaBody.innerHTML = '<tr><td colspan="2">Error al cargar datos.</td></tr>';
                        destinosPopularesTablaBody.innerHTML = '<tr><td colspan="2">Error al cargar datos.</td></tr>';
                        reservasPorEstadoChart.data.labels = ['Pendiente', 'Confirmada', 'Cancelada', 'Finalizada'];
                        reservasPorEstadoChart.data.datasets[0].data = [0, 0, 0, 0];
                        destinosPopularesChart.data.labels = [];
                        destinosPopularesChart.data.datasets[0].data = [];
                        reservasPorEstadoChart.update();
                        destinosPopularesChart.update();
                    });
            }

            cargarEstadisticas();
        });
    </script>
</body>
</html>
